<form>
    <div class="container-full">
        <h5 class="apiTitle"></h5>
        <p>Lista los planes médicos disponibles para Mediya, dado la cantidad de adicionales mayores y menores, así como el <b>token_authentication</b> y <b>id_user_active</b> autenticado.</p>
        <div class="row">
            <div class="col-6 shadow pt-2">
                <table class="table table-borderless hdrEnd"></table>
                <table class="table table-borderless">
                    <thead class="thead-light hdrParam"></thead>
                    <tbody class="bodyParam">
                        <tr>
                            <td><b>Adicionales mayores</b></td>
                            <td><input class="form-control" id="adicMayores" name="adicMayores" type="number" placeholder="Adicionales mayores" value="0"/></td>
                            <td><i>integer</i></td>
                            <td><span class="badge badge-danger">requerido</span></td>
                        </tr>
                        <tr>
                            <td><b>Adicionales menores</b></td>
                            <td><input class="form-control" id="adicMenores" name="adicMenores" type="number" placeholder="Adicionales menores" value="0"/></td>
                            <td><i>integer</i></td>
                            <td><span class="badge badge-danger">requerido</span></td>
                        </tr>
                    </tbody>
                </table>
                <div class="footerEndpoint" style="width:100%;"></div>
            </div>
            <div class="col-6 p-3 shadow areaAjax"></div>
        </div>
    </div>
</form>
<script>
    $("body").off("click", ".btnExec").on("click", ".btnExec", function () {
        var _json = {
            "token_authentication": $("#token_authentication").val(),
            "id_user_active": $("#id_user_active").val(),
            "id_app": $("#id_app").val(),
            "adicMayores": $("#adicMayores").val(),
            "adicMenores": $("#adicMenores").val(),
        }
        _F.onUiExecute(_json).then(function (data) { });
    });
</script>
