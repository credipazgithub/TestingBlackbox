<form>
    <div class="container-full">
        <h5 class="apiTitle"></h5>
        <p>Lista las farmacias disponibles para Mediya, dado el <b>token_authentication</b> y <b>id_user_active</b> autenticado.</p>
        <div class="row">
            <div class="col-6 shadow pt-2">
                <table class="table table-borderless hdrEnd"></table>
                <table class="table table-borderless">
                    <thead class="thead-light hdrParam"></thead>
                    <tbody class="bodyParam">
                        <tr>
                            <td><b>Latitud</b></td>
                            <td><input class="form-control" id="latitud" name="latitud" type="number" placeholder="Latitud" value=""/></td>
                            <td><i>float</i></td>
                            <td><span class="badge badge-secondary">opcional</span></td>
                        </tr>
                        <tr>
                            <td><b>Longitud</b></td>
                            <td><input class="form-control" id="longitud" name="longitud" type="number" placeholder="Longitud" value=""/></td>
                            <td><i>float</i></td>
                            <td><span class="badge badge-secondary">opcional</span></td>
                        </tr>
                        <tr>
                            <td><b>Radio</b></td>
                            <td><input class="form-control" id="radio" name="radio" type="number" placeholder="Radio" value=""/></td>
                            <td style="width:25%;"><i>integer</i><p style="font-size:0.6rem;">Radio en km. del área de volver según valores de latitud y longitud</p></td>
                            <td><span class="badge badge-secondary">opcional</span></td>
                        </tr>
                    </tbody>
                </table>
                <div class="footerEndpoint" style="width:100%;"></div>
            </div>
            <div class="col-6 p-3 shadow areaAjax"></div>
        </div>
    </div>
</form>
<script>
    $("body").off("click", ".btnExec").on("click", ".btnExec", function () {
        var _json = {
            "token_authentication": $("#token_authentication").val(),
            "id_user_active": $("#id_user_active").val(),
            "id_app": $("#id_app").val(),
            "latitud": $("#latitud").val(),
            "longitud": $("#longitud").val(),
            "radio": $("#radio").val(),
        }
        _F.onUiExecute(_json).then(function (data) { });
    });
</script>
