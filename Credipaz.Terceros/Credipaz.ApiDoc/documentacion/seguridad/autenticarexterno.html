<form>
    <div class="container-full">
        <h5 class="apiTitle"></h5>
        <p>Devuelve datos del usuario externo o LDAP a autenticar dado el <b>token_authentication</b> y <b>id_user_active</b> autenticado.</p>
        <div class="row">
            <div class="col-6 shadow pt-2">
                <table class="table table-borderless hdrEnd"></table>
                <table class="table table-borderless">
                    <thead class="thead-light hdrParam"></thead>
                    <tbody class="bodyParam">
                        <tr>
                            <td><b>Nombre de usuario</b></td>
                            <td><input class="form-control" id="Username" name="Username" type="text" placeholder="Nombre de usuario" value=""/></td>
                            <td><i>string</i></td>
                            <td><span class="badge badge-danger">requerido</span></td>
                        </tr>
                        <tr>
                            <td><b>Contraseña</b></td>
                            <td><input class="form-control" id="Password" name="Password" type="text" placeholder="Contraseña" value=""/></td>
                            <td><i>string</i></td>
                            <td><span class="badge badge-danger">requerido</span></td>
                        </tr>
                        <tr>
                            <td><b>Operador externo</b></td>
                            <td><input class="form-control" id="external_operator" name="external_operator" type="number" placeholder="Modo" value=""/></td>
                            <td style="width:25%;"><i>integer</i><p style="font-size:0.6rem;">Valores permitidos <b>1 para EXTERNO / 0 para LDAP</b></p></td>
                            <td><span class="badge badge-danger">requerido</span></td>
                        </tr>
                    </tbody>
                </table>
                <div class="footerEndpoint" style="width:100%;"></div>
            </div>
            <div class="col-6 p-3 shadow areaAjax"></div>
        </div>
    </div>
</form>
<script>
    $("body").off("click", ".btnExec").on("click", ".btnExec", function () {
        var _json = {
            "token_authentication": $("#token_authentication").val(),
            "id_app": $("#id_app").val(),
            "id_user_active": $("#id_user_active").val(),
            "Username": $("#Username").val(),
            "Password": $("#Password").val(),
            "external_operator": $("#external_operator").val()
        }
        _F.onUiExecute(_json).then(function (data) { });
    });
</script>
